<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КАЛЬКУЛЯТОР для визначення допустимого часу опромінення (при постійній потужності дози випромінювання) </title>
    <style>
        /* Стилізація під Платформу ХБРЯ інцидентів */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0b0f19; /* Темний фон платформи */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            font-size: 18px;
        }
        
        .container {
            max-width: 500px;
            margin: auto;
            background: #121824; /* Темно-сіра підкладка блоків */
            padding: 25px;
            
            /* ЖОВТА ОКАНТОВКА ПАНЕЛІ КАЛЬКУЛЯТОРА */
            border: 2px solid #ffd700; 
            
            border-radius: 4px; /* Мінімалістичні закруглення */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #ffd700; /* Яскраво-жовтий фірмовий колір заголовків */
            text-align: center;
            font-size: 1.3em;
            text-transform: uppercase;
            margin-bottom: 25px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 15px;
            letter-spacing: 0.5px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1em;
            color: #e2e8f0;
        }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #1a2333; /* Темне поле вводу */
            border: 1px solid #ffd700; /* Жовтий контур */
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
            color: #ffffff;
            outline: none;
        }
        input[type="number"]:focus, select:focus {
            background-color: #202b3d;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        /* Стилі для кнопок у стилі ХБРЯ */
        .button-group button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* Головна кнопка дії — Жовта */
        #calculateButton {
            background-color: #ffd700; 
            color: #000000;
            margin-bottom: 12px;
        }
        #calculateButton:hover {
            background-color: #e6c200;
        }

        /* Кнопка "Очистити" — Червона, як на панелі платформи */
        #clearButton {
            background-color: #990000;
            color: #ffffff;
        }
        #clearButton:hover {
            background-color: #bd0000;
        }

        /* Інформаційне вікно результатів */
        #result {
            background-color: #172433; /* Синявий відтінок інформаційного вікна */
            border: 1px solid #ffd700;
            padding: 20px;
            border-radius: 4px;
            margin-top: 25px;
            text-align: center;
        }
        #result p {
            margin: 8px 0;
            font-size: 1.1em;
        }
        
        /* Кольорові акценти для результатів */
        .res-title {
            color: #ffd700;
            font-weight: bold;
            text-transform: uppercase;
        }
        .res-value {
            color: #4da6ff; /* Світло-блакитний для проміжних значень */
            font-weight: bold;
        }
        .res-final {
            font-size: 1.5em !important;
            color: #26e681; /* Яскраво-зелений безпечний час */
            font-weight: bold;
            background: #0d1b15;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #135232;
            display: inline-block;
            margin-top: 10px !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⏳ Калькулятор допустимого часу опромінення</h1>

    <form id="radiationForm">
        <label for="doseRate">Потужність дози випромінювання на місцевості (P, мЗв/год):</label>
        <input type="number" id="doseRate" step="0.001" min="0.001" required>

        <label for="totalDose">Задана доза опромінення (мЗв):</label>
        <input type="number" id="totalDose" step="0.01" min="0.01" required>

        <label for="protectionFactor">Коефіцієнт захисту (Кз):</label>
        <select id="protectionFactor" required>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="4">4</option>
            <option value="10">10</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>

        <div class="button-group">
            <button type="submit" id="calculateButton">РОЗРАХУВАТИ ЧАС</button>
            <button type="button" id="clearButton">ОЧИСТИТИ</button>
        </div>
    </form>

    <div id="result">
        <p class="res-title">Результати розрахунку</p>
    </div>
</div>

<script>
    // МЕХАНІЗМ РОЗРАХУНКУ ЗАЛИШ
